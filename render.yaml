services:
  - type: web
    name: bondus-web
    env: node
    plan: free
    buildCommand: cd web && npm install && npm run build
    startCommand: cd web && npm start
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: bondus-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        value: mongodb+srv://native-meeting:native-meeting@cluster0.ijey1ja.mongodb.net/native-meeting?retryWrites=true&w=majority
